# Tutor Virtual — Backend + Frontend en Docker
# MongoDB: corre FUERA de Docker (local en :27017)
#   Ejemplo: mongod local o contenedor mongo aparte

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: tutor-backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-cambiar-en-produccion}
      MONGODB_URI: ${MONGODB_URI:-mongodb://host.docker.internal:27017/tutor-lectura}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3:8b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src/backend:/app/src/backend
      - backend_node_modules:/app/src/backend/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: tutor-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    volumes:
      - ./src/frontend:/app/src/frontend
      - frontend_node_modules:/app/src/frontend/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_node_modules:
  frontend_node_modules:
