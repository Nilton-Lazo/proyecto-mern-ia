# CI — Tutor Virtual MERN IA
# Valida backend, frontend y cobertura en cada push/PR a ramas principales.
# CD (despliegue) queda documentado en docs/CI_CD_GUIDE.md — no se ejecuta aquí.

name: CI - Tutor Virtual MERN IA

on:
  push:
    branches: [main, master, rama-steven]
  pull_request:
    branches: [main, master, rama-steven]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — tests y sintaxis
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PORT: 3000
      JWT_SECRET: test_secret
      JWT_EXPIRES: 7d
      MONGODB_URI: mongodb://127.0.0.1:27017/tutor_virtual_test
      OLLAMA_HOST: http://127.0.0.1:11434
      OLLAMA_MODEL: llama3:8b
      N8N_BASE_URL: http://localhost:5678
      N8N_ACTIVITY_ASSIGNED_WEBHOOK_URL: http://localhost:5678/webhook/activity-assigned
      N8N_INTERNAL_API_KEY: change_me

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Syntax check — backend entrypoint
        run: node --check src/backend/index.js

      - name: Unit tests — backend
        run: pnpm test:unit:backend

      - name: Integration tests — API (Supertest)
        run: pnpm test:integration:api

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend
          path: |
            coverage/unit-backend/
            coverage/integration-api/
          if-no-files-found: ignore

  frontend:
    name: Frontend — lint, tests y build
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: http://localhost:3000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint — frontend
        run: pnpm --filter frontend run lint

      - name: Unit tests — frontend
        run: pnpm test:unit:frontend

      - name: Integration tests — frontend (MSW)
        run: pnpm test:integration:frontend

      - name: Build — frontend
        run: pnpm build:frontend

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-frontend
          path: |
            coverage/unit-frontend/
            coverage/integration-frontend/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # E2E (Cypress) — DESACTIVADO temporalmente
  # ---------------------------------------------------------------------------
